site_name: Grind75 Solutions
site_description: Solution write-ups for the Grind75 LeetCode study guide
site_url: https://thodha.github.io/grind75/
repo_url: https://github.com/ThoDHa/grind75
repo_name: ThoDHa/grind75
edit_uri: edit/solutions/docs/
docs_dir: docs
exclude_docs: |
  _TEMPLATE.md

# The practice/ workspace lives outside docs_dir: it is for local repo use,
# not the deployed site. Problem pages link to it relatively, which resolves
# in the repo but not in the built site, so don't fail the build on those.
validation:
  links:
    not_found: ignore

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets

plugins:
  - search

extra_css:
  - problems/stylesheets/extra.css

nav:
  - Home: index.md
  - Patterns:
    - patterns/index.md
    - Fundamentals:
      - Hashing & Frequency Counting: patterns/hashing/intuition.md
      - Stack: patterns/stack/intuition.md
      - Simulation: patterns/simulation/intuition.md
      - Data-Structure Design: patterns/design/intuition.md
    - Arrays & Sequences:
      - Sliding Window: patterns/sliding_window/intuition.md
      - Two Pointers: patterns/two_pointers/intuition.md
      - Prefix Sum: patterns/prefix_sum/intuition.md
      - Monotonic Stack: patterns/monotonic_stack/intuition.md
    - Search:
